name: Ticker One-Pager Lookup

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol (e.g. AAPL, BKSY, IONQ)'
        required: true
        type: string

jobs:
  lookup:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow committing the archived report PDF back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ticker lookup
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_TICKER_WEBHOOK_URL: ${{ secrets.DISCORD_TICKER_WEBHOOK_URL }}
        run: python scanner.py --ticker "${{ inputs.ticker }}"

      - name: Publish report to site archive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ || true
          if git diff --staged --quiet; then
            echo "No new report to publish"
          else
            git pull --rebase --autostash origin master || true
            git commit -m "Archive ad-hoc report $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin master
            echo "Report published to site"
          fi
