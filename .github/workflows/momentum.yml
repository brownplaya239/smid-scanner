name: Momentum Scans

on:
  schedule:
    # 4:30 PM ET weekdays — EOD, after the setup builders; daily candle complete
    # Cron runs :33 past — GitHub heavily delays top/half-hour schedules.
    # EDT: 20:33 UTC  |  EST: 21:33 UTC
    - cron: '33 20 * * 1-5'   # summer (EDT)
    - cron: '33 21 * * 1-5'   # winter (EST)

  workflow_dispatch:           # manual trigger from GitHub UI anytime

jobs:
  momentum:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow committing archived report PDFs back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run momentum scans
        run: python momentum_scanner.py

      - name: Run swing report card
        run: python swing_report.py

      - name: Publish reports to site archive
        run: bash scripts/publish_reports.sh
